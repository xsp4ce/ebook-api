spring:
  application:
    name: ebook-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ebook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
